<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý điểm sinh viên</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .input-group { margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; }
        .bg-yellow { background-color: #fff9c4; } /* Màu cho sinh viên yếu */
        .stats { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Quản lý điểm sinh viên</h2>
    
    <div class="input-group">
        <input type="text" id="txtName" placeholder="Họ tên sinh viên">
        <input type="number" id="txtScore" placeholder="Điểm (0-10)" step="0.1">
        <button id="btnAdd">Thêm</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentBody">
            </tbody>
    </table>

    <div class="stats" id="statsArea">
        Tổng số: 0 | Điểm trung bình: 0
    </div>

    <div class="filter-group">
        <input type="text" id="searchName" placeholder="Tìm theo tên...">
    
        <select id="filterRank">
            <option value="All">Tất cả xếp loại</option>
            <option value="Giỏi">Giỏi</option>
            <option value="Khá">Khá</option>
            <option value="Trung bình">Trung bình</option>
            <option value="Yếu">Yếu</option>
        </select>

        <button id="sortBtn">Sắp xếp Điểm <span>↕</span></button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
