<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1c1e21; margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: border 0.3s;
        }
        input:focus { border-color: #1877f2; outline: none; }
        .error-message { color: #d93025; font-size: 12px; margin-top: 4px; min-height: 16px; }
        .gender-group, .terms-group { margin: 15px 0; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #1877f2; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #166fe5; }
        #success-box { display: none; text-align: center; padding: 20px; background: #e7f3ff; border-radius: 8px; color: #1877f2; }
    </style>
</head>
<body>

<div class="container">
    <div id="form-wrapper">
        <h2>Tạo tài khoản mới</h2>
        <form id="regForm" novalidate>
            <div class="form-group">
                <label for="fullname">Họ và tên</label>
                <input type="text" id="fullname" placeholder="Nguyễn Văn A">
                <div id="fullnameError" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="vi dụ: name@domain.com">
                <div id="emailError" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="text" id="phone" placeholder="0901234567">
                <div id="phoneError" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Ít nhất 8 ký tự">
                <div id="passwordError" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword">
                <div id="confirmPasswordError" class="error-message"></div>
            </div>

            <div class="gender-group">
                <label>Giới tính:</label>
                <input type="radio" name="gender" value="Nam" id="male"> Nam
                <input type="radio" name="gender" value="Nữ" id="female"> Nữ
                <div id="genderError" class="error-message"></div>
            </div>

            <div class="terms-group">
                <input type="checkbox" id="terms"> Tôi đồng ý với điều khoản dịch vụ
                <div id="termsError" class="error-message"></div>
            </div>

            <button type="submit">Đăng Ký</button>
        </form>
    </div>

    <div id="success-box">
        <h3 id="welcomeMsg"></h3>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
