<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab JS Cơ bản - BTTH03</title>
  <style>
    body { font-family: sans-serif; padding: 20px; line-height: 1.6; transition: 0.3s; }

    #greeting { font-weight: bold; color: blue; }
  </style>
</head>
<body>

  <h1>Khám phá JavaScript (BTTH03)</h1>

  <div class="section">

    <p id="status">Trạng thái: Đang chờ lệnh.</p>
    <button id="runBtn">Nhấn để chào JS</button>
    <button id="btnHello">Đổi nội dung Status</button>
    <button id="changeBgBtn">Đổi màu nền</button>
  </div>

  <div class="section">
    <h3>Xử lý sự kiện Input</h3>
    <input type="text" id="nameInput" placeholder="Nhập tên của bạn...">
    <p id="greeting">Xin chào, !</p>
  </div>

  <script src="main.js"></script>

</html>
