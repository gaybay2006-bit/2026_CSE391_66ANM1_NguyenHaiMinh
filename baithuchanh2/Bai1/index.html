<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2 class="form-title">Get in touch with us by filling contact form below</h2>
        
        <form class="contact-form">
            <div class="form-row">
                <input type="text" placeholder="* Enter your full name" class="flex-item">
                <input type="email" placeholder="* Enter your email address" class="flex-item">
            </div>

            <div class="form-row">
                <input type="text" placeholder="Enter your subject" class="full-width">
            </div>

            <div class="form-row">
                <textarea placeholder="* Your message here..." class="full-width"></textarea>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-send">Send message</button>
                <span class="form-note">* Please fill all required form field, thanks!</span>
            </div>
        </form>
    </div>

</body>
</html>
